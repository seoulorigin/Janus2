apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: janus-syscall-filter
  namespace: cl-security
spec:
  tracepoints:
    - subsystem: "raw_syscalls"
      event: "sys_enter"
      args:
        - index: 4
          type: "int64"
      # 각각의 시스템 콜 번호를 독립된 selector의 Equal 오퍼레이터로 분리 (OR 로직 적용)
      selectors:
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["0"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["1"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["7"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["16"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["24"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["44"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["45"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["202"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["233"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["262"]
        - matchArgs:
            - index: 4
              operator: "Equal"
              values: ["281"]